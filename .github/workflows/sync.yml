name: Sync Khul Blog to Gist

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scraper
        env:
          GIST_ID: 0e68336f68384c48885ac6bf29c5fd36
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: node scrape.js
